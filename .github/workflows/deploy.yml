name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "projects/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy ${{ matrix.project.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - name: homepage
            pages-project: slop-homepage
            directory: projects/homepage
          - name: roof-calculator
            pages-project: slop-roof-calculator
            directory: projects/roof-calculator
          - name: dnd-encounter-generator
            pages-project: slop-dnd-encounter-generator
            directory: projects/dnd-encounter-generator
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ matrix.project.directory }} --project-name=${{ matrix.project.pages-project }} --branch=main
